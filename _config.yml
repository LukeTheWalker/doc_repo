title: JOREK Wiki
description: JOREK project documentation
remote_theme: just-the-docs/just-the-docs@v0.10.0

url: "https://lukethewalker.github.io"
baseurl: "/doc_repo"

search_enabled: true

heading_anchors: true

markdown: kramdown
kramdown:
  smart_quotes: ["apos", "apos", "quot", "quot"]
  typographic_symbols:
    mdash: "---"
    ndash: "--"

footer_content: "JOREK Documentation"

aux_links:
  "JOREK Website":
    - "https://www.jorek.eu"
aux_links_new_tab: true

back_to_top: true
back_to_top_text: "Back to top"

plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-relative-links

defaults:
  - scope:
      path: "docs"
    values:
      layout: "default"
